<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FKA twigs — Thousand Eyes</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #f3ede2;
      color: #9b6b43;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: min(680px, 92vw);
      text-align: center;
      padding: 48px 28px;
    }
    h1 {
      font-size: 2rem;
      margin: 0 0 10px;
      font-weight: 600;
    }
    h2 {
      font-size: 1.5rem;
      margin: 0 0 28px;
      font-style: italic;
      font-weight: 400;
    }
    p {
      margin: 0 0 28px;
      font-size: 1rem;
      opacity: 0.9;
    }
    .links {
      display: grid;
      gap: 14px;
      max-width: 420px;
      margin: 0 auto;
    }
    a.button {
      display: block;
      text-decoration: none;
      color: #9b6b43;
      border: 1px solid #c8ab8d;
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.35);
      transition: 0.2s ease;
    }
    a.button:hover {
      background: rgba(255,255,255,0.7);
    }
    .small {
      margin-top: 28px;
      font-size: 0.9rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>FKA twigs</h1>
    <h2>Thousand Eyes</h2>
    <p>Kies je favoriete platform.</p>

    <div class="links">
      <a class="button" href="https://open.spotify.com/track/1xsb4ZIwzSi5dacBz9oMdA">Luister op Spotify</a>
      <a class="button" href="https://music.apple.com/be/song/thousand-eyes/1477652620">Luister op Apple Music</a>
      <a class="button" href="https://www.youtube.com/watch?v=0Fop8j8QWsA">Luister op YouTube Music</a>
    </div>

    <div class="small">Scan vanuit het boek om te luisteren.</div>
  </main>
</body>
</html>
